<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBR Bank — United Biomes Reserve</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b3e;--navy2:#162040;--navy3:#1c2a52;--navy4:#243060;
  --red:#c8102e;--red2:#a00d24;
  --gold:#c9a84c;--gold2:#e8c46a;--gold3:#f5d98a;
  --white:#ffffff;--off:#f4f6fa;--off2:#e8ecf4;
  --txt:#1a1a2e;--txt2:#4a5568;--txt3:#718096;
  --border:#d1d9e6;--border2:#b8c4d8;
  --green:#1a7a3c;--green2:#e8f5ed;
  --acc-red:#fdf2f4;
  --font:'Source Sans 3',sans-serif;
  --font-serif:'Merriweather',serif;
}
html,body{height:100%;background:var(--off);color:var(--txt);font-family:var(--font)}
.topbar{
  background:var(--navy);height:56px;display:flex;align-items:center;
  padding:0 2rem;position:sticky;top:0;z-index:100;
  border-bottom:3px solid var(--gold)
}
.topbar-logo{display:flex;align-items:center;gap:12px}
.logo-box{background:var(--red);color:var(--white);font-weight:700;font-size:1rem;padding:5px 10px;border-radius:3px;letter-spacing:1px;font-family:var(--font-serif)}
.logo-text{color:var(--white);line-height:1.1}
.logo-title{font-size:.95rem;font-weight:600;letter-spacing:.5px}
.logo-sub{font-size:.6rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.topbar-btn{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);padding:6px 14px;border-radius:3px;cursor:pointer;font-family:var(--font);font-size:.75rem;transition:all .15s}
.topbar-btn:hover{background:rgba(255,255,255,.1);color:var(--white)}
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:230px;background:var(--navy2);flex-shrink:0;border-right:1px solid var(--navy4);padding:1.5rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar-label{font-size:.6rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:0 1.25rem;margin-bottom:.5rem}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;cursor:pointer;color:rgba(255,255,255,.65);font-size:.85rem;transition:all .15s;border-left:3px solid transparent}
.sidebar-item:hover{background:rgba(255,255,255,.05);color:var(--white)}
.sidebar-item.active{background:rgba(200,16,46,.15);color:var(--white);border-left:3px solid var(--red)}
.sidebar-item .icon{font-size:.9rem;width:18px;text-align:center}
.sidebar-add{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;cursor:pointer;color:var(--gold);font-size:.8rem;transition:all .15s;border:1px dashed rgba(201,168,76,.3);margin:.75rem 1rem 0;border-radius:4px;justify-content:center}
.sidebar-add:hover{background:rgba(201,168,76,.1)}
.main{flex:1;padding:2rem;max-width:900px}
.welcome-banner{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);border-radius:6px;padding:1.5rem 2rem;margin-bottom:1.5rem;border:1px solid var(--navy4);display:flex;justify-content:space-between;align-items:center}
.wb-title{color:rgba(255,255,255,.55);font-size:.7rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.wb-name{color:var(--white);font-size:1.4rem;font-weight:700}
.wb-sub{color:var(--gold);font-size:.72rem;margin-top:4px}
.wb-right{text-align:right}
.wb-balance-label{color:rgba(255,255,255,.5);font-size:.65rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.wb-balance{color:var(--gold2);font-size:1.8rem;font-weight:700;font-family:var(--font-serif)}
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:1rem 1.25rem}
.card.points{border-top:3px solid var(--gold)}
.card-label{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px}
.card-val{font-size:1.2rem;font-weight:700}
.card-val.green{color:var(--green)}
.card-val.red{color:var(--red)}
.card-val.gold{color:var(--gold)}
.card-sub{font-size:.68rem;color:var(--txt3);margin-top:4px}
.points-badge{display:inline-block;background:var(--navy);color:var(--gold);font-size:.6rem;padding:2px 8px;border-radius:20px;margin-top:6px;font-weight:600;letter-spacing:1px}
.panels-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.panel{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.panel.full{grid-column:1/-1}
.panel-header{background:var(--off);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ph-left{display:flex;align-items:center;gap:8px}
.ph-icon{color:var(--red)}
.panel-body{padding:1.25rem}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.7rem;font-weight:600;color:var(--txt2);margin-bottom:5px}
input[type=number],input[type=text]{width:100%;background:var(--white);border:1px solid var(--border2);border-radius:4px;padding:9px 12px;color:var(--txt);font-family:var(--font);font-size:.9rem;outline:none;transition:border .15s}
input:focus{border-color:var(--navy3);box-shadow:0 0 0 3px rgba(13,27,62,.07)}
input::placeholder{color:var(--txt3)}
.btn{width:100%;padding:10px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:.78rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;border:none}
.btn-deposit{background:var(--navy);color:var(--white)}
.btn-deposit:hover{background:var(--navy3)}
.btn-withdraw{background:var(--white);border:2px solid var(--red) !important;color:var(--red)}
.btn-withdraw:hover{background:var(--acc-red)}
.btn-loan{background:var(--gold);color:var(--navy);font-weight:700}
.btn-loan:hover{background:var(--gold2)}
.btn-repay{background:var(--white);border:2px solid var(--gold) !important;color:var(--gold)}
.btn-repay:hover{background:#fdf8ec}
.btn-sm{background:none;border:1px solid var(--border2);color:var(--txt3);font-size:.62rem;padding:4px 10px;width:auto;border-radius:3px;cursor:pointer;font-family:var(--font);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.btn-sm:hover{border-color:var(--red);color:var(--red)}
.loan-alert{background:#fffbf0;border:1px solid var(--gold);border-left:4px solid var(--gold);border-radius:4px;padding:1rem 1.25rem;margin-bottom:1rem}
.la-title{font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--gold);margin-bottom:6px;letter-spacing:.5px}
.la-detail{font-size:.82rem;color:var(--txt);margin-bottom:4px}
.la-owed{font-size:1.1rem;font-weight:700;color:var(--red);margin:4px 0}
.la-warn{font-size:.68rem;color:var(--txt3)}
.hist-table{width:100%;border-collapse:collapse;font-size:.82rem}
.hist-table th{background:var(--off);text-align:left;padding:8px 12px;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--txt2);border-bottom:2px solid var(--border);font-weight:700}
.hist-table td{padding:9px 12px;border-bottom:1px solid var(--off2);color:var(--txt)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--off)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-dep{background:#e8f5ed;color:var(--green)}
.badge-wd{background:var(--acc-red);color:var(--red)}
.badge-int{background:#fdf8ec;color:#8a6a00}
.badge-loan{background:#fff3cd;color:#7a5a00}
.badge-repay{background:var(--off2);color:var(--txt2)}
.amt-pos{color:var(--green);font-weight:700}
.amt-neg{color:var(--red);font-weight:700}
.amt-gold{color:#8a6a00;font-weight:700}
.hist-scroll{max-height:260px;overflow-y:auto}
.hist-scroll::-webkit-scrollbar{width:4px}
.hist-scroll::-webkit-scrollbar-track{background:var(--off)}
.hist-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pts-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--off2);font-size:.8rem}
.pts-row:last-child{border-bottom:none}
.pts-reason{color:var(--txt)}
.pts-earned{color:var(--gold);font-weight:700}
.pts-date{color:var(--txt3);font-size:.68rem}
.empty-state{text-align:center;padding:5rem 2rem;background:var(--white);border:1px solid var(--border);border-radius:6px}
.es-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.25}
.es-title{font-size:1rem;font-weight:600;color:var(--txt2);margin-bottom:.5rem}
.es-sub{font-size:.82rem;color:var(--txt3)}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:8px;overflow:hidden;min-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-head{background:var(--navy);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--gold)}
.modal-head h3{color:var(--white);font-size:.9rem;font-weight:600}
.modal-body{padding:1.5rem}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem}
.modal-btns button{flex:1;padding:10px;border-radius:4px;cursor:pointer;font-family:var(--font);font-size:.78rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.modal-confirm{background:var(--navy);color:var(--white);border:none}
.modal-confirm:hover{background:var(--navy3)}
.modal-cancel{background:var(--white);border:1px solid var(--border2);color:var(--txt2)}
.modal-cancel:hover{border-color:var(--red);color:var(--red)}
.pts-key{display:flex;gap:1rem;font-size:.7rem;color:var(--txt3);margin-top:6px}
.pts-key span{display:flex;align-items:center;gap:4px}
.pts-key b{color:var(--gold)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-box">UBR</div>
    <div class="logo-text">
      <div class="logo-title">United Biomes Reserve</div>
      <div class="logo-sub">Overworld Central Bank</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="exportData()">&#8595; Export Save</button>
    <button class="topbar-btn" onclick="document.getElementById('import-file').click()">&#8593; Import Save</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div style="margin-bottom:1.25rem">
      <div class="sidebar-label">Player Accounts</div>
      <div id="sidebar-accounts"></div>
      <div class="sidebar-add" onclick="openModal()">+ Open Account</div>
    </div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="logo-box" style="font-size:.8rem;padding:3px 8px">UBR</div>
      <h3>Open New Account</h3>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Player Username</label>
        <input type="text" id="modal-input" placeholder="Enter Minecraft username" autocomplete="off" />
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="confirmModal()">Open Account</button>
      </div>
    </div>
  </div>
</div>

<script>
const INTEREST_RATE=0.03,LOAN_RATE=0.05,STORAGE_KEY='ubr_bank_v2';
// migrate old keys
['ubr_bank_v3','ubr_bank_v4'].forEach(k=>{const d=localStorage.getItem(k);if(d&&!localStorage.getItem(STORAGE_KEY)){localStorage.setItem(STORAGE_KEY,d);}});
const PTS_DEPOSIT=1,PTS_CHECK=2,PTS_INTEREST=5;

function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{accounts:{},active:null}}catch(e){return{accounts:{},active:null}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db))}

let db=load(),active=db.active||null;

function ts(){return Date.now()}
function daysElapsed(t){return Math.floor((ts()-t)/86400000)}

function getIntDays(acc){return acc.interestDays||3;}

function applyInterest(acc){
  const ID=getIntDays(acc);
  if(!acc.lastIntTs) acc.lastIntTs=acc.createdTs||ts();
  const d=daysElapsed(acc.lastIntTs),periods=Math.floor(d/ID);
  if(periods>0&&acc.balance>0){
    for(let i=0;i<periods;i++){
      const g=Math.floor(acc.balance*INTEREST_RATE);
      if(g>0){
        acc.balance+=g;
        acc.history.unshift({t:'interest',a:g,ts:ts(),note:'3% interest payout'});
        acc.points=(acc.points||0)+PTS_INTEREST;
        acc.pointsHistory=acc.pointsHistory||[];
        acc.pointsHistory.unshift({reason:'Interest payout',pts:PTS_INTEREST,ts:ts()});
      }
    }
    acc.lastIntTs+=periods*ID*86400000;
  }
  if(acc.loan&&acc.loan.on){
    if(!acc.loan.lastTs) acc.loan.lastTs=acc.loan.startTs;
    const ld=daysElapsed(acc.loan.lastTs);
    if(ld>0){for(let i=0;i<ld;i++){acc.loan.rem+=Math.floor(acc.loan.rem*LOAN_RATE);}acc.loan.lastTs+=ld*86400000;}
  }
  return acc;
}

function daysUntilInt(acc){
  const ID=getIntDays(acc);
  if(!acc.lastIntTs) return ID;
  const d=daysElapsed(acc.lastIntTs)%ID;
  return d===0?0:ID-d;
}

function setDays(n){
  const v=parseInt(n);
  if(!v||v<1) return;
  db.accounts[active].interestDays=v;
  save();render();
}

function renderSidebar(){
  const el=document.getElementById('sidebar-accounts');
  const names=Object.keys(db.accounts);
  if(!names.length){el.innerHTML='<div style="padding:.5rem 1.25rem;font-size:.75rem;color:rgba(255,255,255,.3)">No accounts</div>';return;}
  el.innerHTML=names.map(n=>{
    const hasLoan=db.accounts[n].loan&&db.accounts[n].loan.on;
    return `<div class="sidebar-item${active===n?' active':''}" onclick="selectTab('${n}')">
      <span class="icon">${hasLoan?'⚠':'◆'}</span><span>${n}</span>
    </div>`;
  }).join('');
}

function selectTab(n){active=n;db.active=n;save();render()}

function render(){
  renderSidebar();
  const mc=document.getElementById('main-content');
  const names=Object.keys(db.accounts);
  if(!names.length){
    mc.innerHTML=`<div class="empty-state"><div class="es-icon">🏦</div><div class="es-title">No accounts yet</div><div class="es-sub">Click "Open Account" in the sidebar to get started</div></div>`;
    return;
  }
  if(!active||!db.accounts[active]) active=names[0];
  let acc=JSON.parse(JSON.stringify(db.accounts[active]));
  acc=applyInterest(acc);
  acc.points=acc.points||0;
  acc.pointsHistory=acc.pointsHistory||[];
  db.accounts[active]=acc;
  save();

  const dLeft=daysUntilInt(acc);
  const nextGain=Math.floor(acc.balance*INTEREST_RATE);
  const hasLoan=acc.loan&&acc.loan.on;

  const loanHTML=hasLoan?`<div class="loan-alert">
    <div class="la-title">⚠ Active Loan</div>
    <div class="la-detail">Original: ◆ ${acc.loan.orig.toLocaleString()} &nbsp;|&nbsp; Issued: ${new Date(acc.loan.startTs).toLocaleDateString()}</div>
    <div class="la-owed">Currently owed: ◆ ${acc.loan.rem.toLocaleString()}</div>
    <div class="la-warn">Accruing 5% per real day until repaid</div>
    <button class="btn btn-repay" style="margin-top:10px;max-width:180px;border:2px solid var(--gold)" onclick="repayLoan()">Repay Full Loan</button>
  </div>`:'';

  const histRows=acc.history.length?acc.history.map(h=>{
    let badge='',cls='',sign='';
    if(h.t==='deposit'){badge='<span class="badge badge-dep">Deposit</span>';cls='amt-pos';sign='+'}
    else if(h.t==='withdraw'){badge='<span class="badge badge-wd">Withdraw</span>';cls='amt-neg';sign='-'}
    else if(h.t==='interest'){badge='<span class="badge badge-int">Interest</span>';cls='amt-gold';sign='+'}
    else if(h.t==='loan'){badge='<span class="badge badge-loan">Loan</span>';cls='amt-gold';sign=''}
    else if(h.t==='repay'){badge='<span class="badge badge-repay">Repaid</span>';cls='amt-neg';sign='-'}
    return `<tr><td>${badge}</td><td style="color:var(--txt2)">${h.note||''}</td><td class="${cls}">${sign}◆${h.a.toLocaleString()}</td><td style="color:var(--txt3);font-size:.72rem">${new Date(h.ts).toLocaleDateString()}</td></tr>`;
  }).join(''):`<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--txt3)">No transactions yet</td></tr>`;

  const ptsRows=acc.pointsHistory.length?acc.pointsHistory.slice(0,15).map(p=>`
    <div class="pts-row">
      <span class="pts-reason">${p.reason}</span>
      <span class="pts-earned">+${p.pts} pts</span>
      <span class="pts-date">${new Date(p.ts).toLocaleDateString()}</span>
    </div>`).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--txt3);font-size:.8rem">No points earned yet</div>`;

  const loanForm=!hasLoan?`<div class="panels-row"><div class="panel full">
    <div class="panel-header"><div class="ph-left"><span class="ph-icon">◆</span>Issue Loan</div></div>
    <div class="panel-body" style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end">
      <div class="field" style="margin:0"><label>Loan Amount (Diamonds)</label><input type="number" id="loan-amt" placeholder="0" min="1"/></div>
      <button class="btn btn-loan" style="width:auto;padding:10px 24px;white-space:nowrap" onclick="doLoan()">Issue Loan — 5%/day</button>
    </div>
  </div></div>`:'';

  mc.innerHTML=`
    <div class="welcome-banner">
      <div>
        <div class="wb-title">Account Holder</div>
        <div class="wb-name">${active}</div>
        <div class="wb-sub">Member since ${new Date(acc.createdTs).toLocaleDateString()}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
          <span style="font-size:.68rem;color:rgba(255,255,255,.5);letter-spacing:.5px">Interest every</span>
          <input type="number" min="1" max="365" value="${acc.interestDays||3}" onchange="setDays(this.value)" style="width:52px;padding:4px 8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:var(--gold2);font-family:var(--font);font-size:.82rem;text-align:center;outline:none"/>
          <span style="font-size:.68rem;color:rgba(255,255,255,.5)">days</span>
        </div>
      </div>
      <div class="wb-right">
        <div class="wb-balance-label">Current Balance</div>
        <div class="wb-balance">◆ ${acc.balance.toLocaleString()}</div>
      </div>
    </div>
    <div class="cards-row">
      <div class="card">
        <div class="card-label">Balance</div>
        <div class="card-val green">◆ ${acc.balance.toLocaleString()}</div>
        <div class="card-sub">${dLeft===0?'Interest due today':`Interest in ${dLeft}d`}${nextGain>0?` (+◆${nextGain})`:''}  </div>
      </div>
      <div class="card">
        <div class="card-label">Total Deposited</div>
        <div class="card-val">◆ ${acc.totalDep.toLocaleString()}</div>
        <div class="card-sub">All time</div>
      </div>
      <div class="card">
        <div class="card-label">Total Withdrawn</div>
        <div class="card-val red">◆ ${acc.totalWd.toLocaleString()}</div>
        <div class="card-sub">All time</div>
      </div>
      <div class="card points">
        <div class="card-label">Reward Points</div>
        <div class="card-val gold">${acc.points.toLocaleString()} pts</div>
        <div class="points-badge">UBR REWARDS</div>
      </div>
    </div>
    ${loanHTML}
    <div class="panels-row">
      <div class="panel">
        <div class="panel-header"><div class="ph-left"><span class="ph-icon">+</span>Deposit Diamonds</div></div>
        <div class="panel-body">
          <div class="field"><label>Amount (Diamonds)</label><input type="number" id="dep-amt" placeholder="0" min="1"/></div>
          <button class="btn btn-deposit" onclick="doDeposit()">Deposit ◆</button>
          <div class="pts-key"><span><b>+${PTS_DEPOSIT}</b> pt per deposit</span></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="ph-left"><span class="ph-icon">-</span>Withdraw Diamonds</div></div>
        <div class="panel-body">
          <div class="field"><label>Amount (Diamonds)</label><input type="number" id="wd-amt" placeholder="0" min="1"/></div>
          <button class="btn btn-withdraw" style="border:2px solid var(--red)" onclick="doWithdraw()">Withdraw ◆</button>
          <div class="pts-key"><span><b>+${PTS_CHECK}</b> pts per check used</span></div>
        </div>
      </div>
    </div>
    ${loanForm}
    <div class="panels-row">
      <div class="panel full">
        <div class="panel-header">
          <div class="ph-left"><span class="ph-icon">☰</span>Transaction History</div>
          <button class="btn-sm" onclick="deleteAccount()">Delete Account</button>
        </div>
        <div class="hist-scroll"><table class="hist-table"><thead><tr><th>Type</th><th>Note</th><th>Amount</th><th>Date</th></tr></thead><tbody>${histRows}</tbody></table></div>
      </div>
    </div>
    <div class="panels-row">
      <div class="panel full">
        <div class="panel-header"><div class="ph-left"><span class="ph-icon">★</span>Reward Points History</div><span style="font-size:.68rem;color:var(--txt3)">Dep +${PTS_DEPOSIT} &nbsp;|&nbsp; Check +${PTS_CHECK} &nbsp;|&nbsp; Interest +${PTS_INTEREST}</span></div>
        <div class="panel-body">${ptsRows}</div>
      </div>
    </div>
  `;
}

function doDeposit(){
  const v=parseInt(document.getElementById('dep-amt').value);
  if(!v||v<1) return;
  const acc=db.accounts[active];
  acc.balance+=v;acc.totalDep+=v;
  acc.history.unshift({t:'deposit',a:v,ts:ts()});
  acc.points=(acc.points||0)+PTS_DEPOSIT;
  acc.pointsHistory=acc.pointsHistory||[];
  acc.pointsHistory.unshift({reason:`Deposit ◆${v.toLocaleString()}`,pts:PTS_DEPOSIT,ts:ts()});
  save();render();
}

function doWithdraw(){
  const v=parseInt(document.getElementById('wd-amt').value);
  if(!v||v<1) return;
  const acc=db.accounts[active];
  if(v>acc.balance){alert('Insufficient balance');return;}
  acc.balance-=v;acc.totalWd+=v;
  acc.history.unshift({t:'withdraw',a:v,ts:ts(),note:'Check used'});
  acc.points=(acc.points||0)+PTS_CHECK;
  acc.pointsHistory=acc.pointsHistory||[];
  acc.pointsHistory.unshift({reason:`Check used — ◆${v.toLocaleString()}`,pts:PTS_CHECK,ts:ts()});
  save();render();
}

function doLoan(){
  const v=parseInt(document.getElementById('loan-amt').value);
  if(!v||v<1) return;
  const acc=db.accounts[active];
  if(acc.loan&&acc.loan.on){alert('Account already has an active loan');return;}
  acc.loan={on:true,orig:v,rem:v,startTs:ts(),lastTs:ts()};
  acc.balance+=v;
  acc.history.unshift({t:'loan',a:v,ts:ts(),note:'Loan @ 5%/day'});
  save();render();
}

function repayLoan(){
  const acc=db.accounts[active];
  if(!acc.loan||!acc.loan.on) return;
  const owed=acc.loan.rem;
  if(owed>acc.balance){alert(`Need ◆${owed.toLocaleString()}, have ◆${acc.balance.toLocaleString()}`);return;}
  acc.balance-=owed;acc.totalWd+=owed;
  acc.history.unshift({t:'repay',a:owed,ts:ts(),note:'Loan fully repaid'});
  acc.loan.on=false;
  save();render();
}

function deleteAccount(){
  if(!confirm(`Permanently delete ${active}?`)) return;
  delete db.accounts[active];
  const rem=Object.keys(db.accounts);
  active=rem.length?rem[0]:null;
  db.active=active;
  save();render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ubr_bank_save_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(e){
  const file=e.target.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(!imp.accounts) throw new Error();
      if(!confirm('Replace all current data?')) return;
      db=imp;active=db.active||Object.keys(db.accounts)[0]||null;
      save();render();
    }catch{alert('Invalid save file');}
  };
  r.readAsText(file);e.target.value='';
}

function openModal(){
  document.getElementById('modal-input').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function confirmModal(){
  const name=document.getElementById('modal-input').value.trim();
  if(!name) return;
  if(db.accounts[name]){alert('Account already exists');return;}
  const t=ts();
  db.accounts[name]={balance:0,totalDep:0,totalWd:0,history:[],createdTs:t,lastIntTs:t,loan:null,points:0,pointsHistory:[]};
  active=name;db.active=name;
  save();closeModal();render();
}
document.getElementById('modal-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal()});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

render();
</script>
</body>
</html>
